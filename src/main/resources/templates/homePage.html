        <div class="popup">
            <h2>⚠️ Security Warning</h2>
            <p>You're using the default password for superadmin, please change it now.</p>
            <form th:action="@{/account/change-default-password}" method="post">
                <input type="password" name="newPassword" placeholder="New Password" required minlength="6">

            </form>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav align-items-center">
                    <a class="nav-link" aria-current="page" th:href="@{#ciao}">Homepage</a>
                    <a class="nav-link" th:href="@{#bello}">Members</a>
                    <a th:if="${#authorization.expression('isAnonymous()')}" class="nav-link" th:href="@{/login}">
                        <button type="button" class="btn btn-outline-light">Login</button>
                    </a>
                    <a th:if="${#authorization.expression('isAuthenticated()')}" class="nav-link">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-outline-danger">Logout</button>
                        </form>
                    </a>
                </div>
            </div>
        </div>

    <div th:if="${#authorization.expression('isAuthenticated()')}">
        <h1>Welcome back, <span th:text="${#authentication.name}">User</span>!</h1>
    </div>

    <div th:if="${#authorization.expression('isAnonymous()')}">
        <h1>Welcome to the homepage!</h1>
    </div>
